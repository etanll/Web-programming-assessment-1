<!DOCTYPE html> <!DOCTYPE html> <!-- Tells the browser this is HTML5-->
<html>
    <head>
        <title>EMBED VIDEO</title>
         <link rel="stylesheet" href="embedvid.css"> <!-- This links an external CSS stylesheet -->
    </head>
    <body>
       <video width="1280" height="720" loop poster="mountain11.jpg" controls> <!-- This video has a 1280x720 resolution, shows mountain11.jpg as the photo when its not being played, has playback controls, and loops automatically -->
          <source src="mountainvid.mp4" type="video/mp4">    <!-- this sets the source of the video file and format -->
       </video>
    </body>
</html>
